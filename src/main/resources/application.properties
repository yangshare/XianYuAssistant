server.port=12400

# MySQL Database
spring.datasource.url=jdbc:mysql://192.168.6.3:3308/xianyu_assistant?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=yang

# MyBatis-Plus
mybatis-plus.configuration.map-underscore-to-camel-case=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.encoding=UTF-8

# Redis Configuration
spring.data.redis.host=192.168.6.3
spring.data.redis.port=6379
spring.data.redis.database=0
spring.data.redis.password=
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0

# Encryption Configuration
# 请使用AesEncryptUtils.generateKey()生成并替换此密钥
# 警告：更改此密钥将导致已加密的Cookie无法解密
app.encryption.key=XianYuAssistantDefaultKeyChangeInProduction123

# Admin Token for sensitive operations (delete account, etc.)
# 请修改为随机强密码
app.admin.token=change_me_in_production