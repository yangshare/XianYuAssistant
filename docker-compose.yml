version: '3.8'

services:
  xianyu-assistant:
    image: yangshare/xianyu-assistant:latest
    # 如需本地构建，取消注释下行
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    container_name: xianyu-assistant
    ports:
      - "${SERVER_PORT:-12400}:12400"
    volumes:
      # 持久化日志
      - ./logs:/app/logs
    environment:
      - JAVA_OPTS=-Xms256m -Xmx512m
      - TZ=Asia/Shanghai
      # MySQL 数据库配置（通过环境变量或 .env 文件配置）
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL:-jdbc:mysql://host.docker.internal:3306/xianyu_assistant?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME:-root}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD:?SPRING_DATASOURCE_PASSWORD is required}
    restart: unless-stopped
    # 如果使用 Docker 内置 MySQL，取消注释下面的 depends_on
    # depends_on:
    #   mysql:
    #     condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # 健康检查由 Dockerfile 定义，此处继承即可

  # 可选：Docker 内置 MySQL（如需要可取消注释）
